    "/api/negocios/{id}/arquivos": {
      "post": {
        "tags": [
          "Negocio"
        ],
        "summary": "Anexar arquivo ao negócio",
        "operationId": "negocio_arquivo_upload",
        "description": "Faz upload de um arquivo (enviado em base64 no corpo JSON) e o associa ao negócio informado. O arquivo é gravado no storage S3 sob o namespace de negócios e persistido como anexo. Registra um log de auditoria 'file.create'; uploads do mesmo usuário para o mesmo negócio em até 30 segundos são agrupados em um único log. Limite de 100 MB por arquivo. Retorna o anexo criado serializado (id, filename, originalFilename, url, mimeType, size).",
        "parameters": [
          {
            "description": "ID do negócio ao qual o arquivo será anexado.",
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "data": {
                    "description": "Conteúdo do arquivo codificado em base64. Aceita prefixo data URI (ex.: 'data:application/pdf;base64,...'), que é removido automaticamente. Obrigatório.",
                    "type": "string"
                  },
                  "filename": {
                    "description": "Nome original do arquivo, incluindo extensão (ex.: 'contrato.pdf'). Obrigatório.",
                    "type": "string"
                  }
                },
                "required": [
                  "filename",
                  "data"
                ],
                "type": "object"
              }
            }
          },
          "description": "Arquivo a anexar, com conteúdo binário codificado em base64.",
          "required": true
        },
        "x-enriched": true
      }
    },
    "/api/negocios/{id}/arquivos/{arquivo}/download": {
      "get": {
        "tags": [
          "Negocio"
        ],
        "summary": "Baixar arquivo do negócio",
        "operationId": "negocio_arquivo_download",
        "description": "Retorna a URL de acesso ao arquivo anexado ao negócio. Para arquivos públicos, devolve a URL pública direta. Para arquivos privados, gera uma URL pré-assinada do S3 válida por 30 minutos. Use o parâmetro de query 'inline' para forçar exibição no navegador em vez de download como anexo. Retorna um objeto com 'url' (e 'expires' quando pré-assinada).",
        "parameters": [
          {
            "description": "ID do negócio dono do arquivo.",
