    "/api/website/v2/buscador/filtros": {
      "get": {
        "tags": [
          "WebsiteV2"
        ],
        "summary": "Filtros agregados pra UI de busca (com contagem)",
        "operationId": "website_v2_buscador_filtros",
        "description": "Retorna grupos de filtro (categorias, subcategorias, UFs, cidades, bairros, comitentes) com contagem de lotes ativos por opção. **Essencial pra montar dropdowns interdependentes** em cascata UF → cidade → bairro.\n\n**Como usar a cascata:**\n1. Carrega `/buscador/filtros` sem filtros → mostra todos os grupos com contagens globais.\n2. Usuário escolhe UF=PR → chama `/buscador/filtros?uf=PR` → as contagens de `cidades`, `bairros`, `comitentes` e `categorias` são refilteredas, mas `ufs` mantém **todas** as UFs (não filtra pelo próprio).\n3. Usuário escolhe cidade=Curitiba → chama `?uf=PR&cidade=Curitiba` → idem.\n\nCada grupo **ignora seu próprio filtro** ao calcular as opções, pra evitar \"0 resultados\" ao trocar de opção dentro do mesmo grupo.",
        "parameters": [
          {
            "name": "categoria",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "subcategoria",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "uf",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "cidade",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "bairro",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "comitente",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Grupos de filtro com contagem",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/WebsiteV2_BuscadorFiltros"
                }
              }
            }
          }
        },
        "security": [
          {
            "tenantHeader": []
          }
        ]
      }
    },
