    "/api/website/v2/lotes": {
      "get": {
        "tags": [
          "WebsiteV2"
        ],
        "summary": "Lista de lotes (com ou sem filtro de leilão)",
        "operationId": "website_v2_lotes_list",
        "description": "Endpoint canônico de listagem de lotes — paginado, com bem nested em cada item.\n\n**Pra listar lotes de um leilão específico**, passe `?leilao={id}`. Não há endpoint nested (`/leiloes/{id}/lotes`) — foi consolidado aqui pra evitar duplicação.\n\nFiltros amplos pra cobrir cenários de site real:\n\n- Home → destaques ativos: `?destaque=true&somenteAtivos=true&limit=12`\n- Página de evento (lotes de um leilão): `?leilao=42&sortBy=numero&order=asc`\n- Página de busca: `?categoria=9&uf=PR&cidade=Curitiba&valorMinimo=50000&valorMaximo=500000`\n- Por vendedor: `?comitente=42` (alias plural: `comitentes`)\n- Por bairro: `?cidade=Curitiba&bairro=Centro`\n- Buscar pelo número do lote num leilão: `?leilao=42&criterio=numero&valor=15`\n- Ordenar por menor preço: `?sortBy=menorValor&order=asc`\n- Mais vistos: `?sortBy=maisVistos&order=desc`",
        "parameters": [
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 1,
              "minimum": 1
            }
          },
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 12,
              "minimum": 1,
              "maximum": 100
            }
          },
          {
            "name": "sortBy",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "numero",
                "valorInicial",
                "menorValor",
                "maiorValor",
                "maisVistos",
                "ufCidade",
                "order",
                "id"
              ],
              "default": "id"
            },
            "description": "Pra página de evento, prefira `sortBy=numero&order=asc` (sequencial). `menorValor`/`maiorValor` ordenam por valor inicial. `maisVistos` por `statsVisitas`. `ufCidade` agrupa por UF+cidade. `order` usa campo backend de ordenação manual."
          },
          {
            "name": "order",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "asc",
                "desc"
              ],
              "default": "desc"
            }
          },
          {
            "name": "descending",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Alias legado de `order` — `true` equivale a `order=desc`."
          },
          {
            "name": "leilao",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Filtra lotes deste leilão. Não retorna 404 se o ID não existir — apenas lista vazia. Pra detectar leilão inexistente, valide antes via `GET /leiloes/{id}`."
          },
          {
            "name": "destaque",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            }
          },
          {
            "name": "somenteAtivos",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Apenas lotes ativos (não cancelados/vendidos/encerrados)."
          },
          {
            "name": "categoria",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "ID do tipoPai do bem (categoria mãe)"
          },
          {
            "name": "subcategoria",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "ID do tipo do bem (subcategoria)"
          },
          {
            "name": "uf",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "cidade",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "bairro",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "comitente",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "ID do comitente (vendedor). Aceita também `comitentes` (plural, mesmo valor) por compat legado."
          },
          {
            "name": "valorMinimo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            }
          },
          {
            "name": "valorMaximo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            }
          },
          {
            "name": "search",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Busca textual em título/descrição do bem + descrição do lote"
          },
          {
            "name": "criterio",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "numero",
                "id"
              ]
            },
            "description": "Modo de busca exata. Use junto com `valor`."
          },
          {
            "name": "valor",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Valor da busca exata definida em `criterio`."
          },
          {
            "name": "area_edificada_min",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área edificada mínima (m²)."
          },
          {
            "name": "area_edificada_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área edificada máxima (m²)."
          },
          {
            "name": "area_terreno_min",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área de terreno mínima (m²)."
          },
          {
            "name": "area_terreno_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área de terreno máxima (m²)."
          },
          {
            "name": "vagas",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Imóvel: nº mínimo de vagas de garagem."
          },
          {
            "name": "ocupado",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Imóvel: filtra por ocupado (true) / desocupado (false)."
          },
          {
            "name": "finalidade",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Imóvel: ID de FinalidadeImovel (residencial/comercial/...)."
          },
          {
            "name": "marca",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Veículo: ID da marca (preciso) ou texto (LIKE no nome)."
          },
          {
            "name": "modelo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Veículo: ID do modelo (preciso) ou texto (LIKE no nome)."
          },
          {
            "name": "ano_min",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ano (modelo) mínimo."
          },
          {
            "name": "ano_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ano (modelo) máximo."
          },
          {
            "name": "km_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: quilometragem máxima."
          },
          {
            "name": "combustivel",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ID do tipo de combustível."
          },
          {
            "name": "cor",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ID da cor."
          },
          {
            "name": "bbox",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "pattern": "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$"
            },
            "description": "Bounding box geográfica `sw_lat,sw_lng,ne_lat,ne_lng`. Filtra por lat/lng do bem.",
            "example": "-24,-47,-23,-46"
          },
          {
            "name": "lat",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Centro da busca por raio (usar com `lng` + `raio`)."
          },
          {
            "name": "lng",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Centro da busca por raio (usar com `lat` + `raio`)."
          },
          {
            "name": "raio",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Raio em km ao redor de (lat,lng). Aproximação por bounding box. `bbox` tem precedência se ambos vierem."
          },
          {
            "name": "X-TOKEN",
            "in": "header",
            "required": false,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Lotes paginados",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/WebsiteV2_PaginatedLotes"
                }
              }
            }
          }
        },
        "security": [
          {
            "tenantHeader": []
          }
        ]
      }
    },
