    "/api/processos/{id}/arquivos/{arquivoId}": {
      "delete": {
        "tags": [
          "Processo"
        ],
        "summary": "Excluir arquivo de um processo",
        "operationId": "processo_arquivo_delete",
        "description": "Remove (soft delete) um arquivo vinculado ao processo, marcando-o como deletado sem apagar fisicamente o objeto no storage. Também ajusta o log de criação (`file.create`) removendo o item da lista de arquivos e registra um log `file.delete`. Exige a permissão (ACL) de apagar arquivo. Retorna 404 caso o arquivo não exista. Em caso de sucesso retorna `{\"deleted\": \"OK\"}`.",
