    "/api/processos/{id}/arquivos": {
      "post": {
        "tags": [
          "Processo"
        ],
        "summary": "Anexar arquivo a um processo",
        "operationId": "processo_arquivo_upload",
        "description": "Faz upload de um arquivo e o vincula ao processo informado. O conteúdo do arquivo é enviado como JSON (campo `data` em base64, opcionalmente com prefixo data URI) junto do `filename` original; o arquivo é armazenado no storage S3 e registrado na tabela de arquivos do processo. Exige a permissão (ACL) de criação de arquivo de processo. O upload é agrupado em um único registro de log (`file.create`) quando ocorre em até 30 segundos do anterior pelo mesmo usuário/processo. Limite de 100 MB por arquivo. Retorna o arquivo persistido (id, filename, originalFilename, url, mimeType, size, etc.).",
        "parameters": [
          {
            "description": "ID do processo ao qual o arquivo será anexado.",
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "data": {
                    "description": "Conteúdo do arquivo em base64. Aceita prefixo data URI (ex.: \"data:application/pdf;base64,...\"), que é removido automaticamente antes de decodificar.",
                    "type": "string"
                  },
                  "filename": {
                    "description": "Nome original do arquivo, com extensão (ex.: \"contrato.pdf\"). Obrigatório.",
                    "type": "string"
                  }
                },
                "required": [
                  "filename",
                  "data"
                ],
                "type": "object"
              }
            }
          },
          "description": "Conteúdo do arquivo codificado em base64 (modelo FileModel).",
          "required": true
        },
        "x-enriched": true
      }
    },
    "/api/processos/{id}/arquivos/{arquivo}/download": {
      "get": {
        "tags": [
          "Processo"
        ],
        "summary": "Baixar arquivo de um processo",
        "operationId": "processo_arquivo_download",
        "description": "Gera uma URL de download para um arquivo do processo. Se o arquivo for público, retorna diretamente a URL pública armazenada. Caso contrário, gera uma URL assinada do S3 com validade de 30 minutos. Use o parâmetro `inline` para que o navegador exiba o arquivo em vez de forçar o download. Exige a permissão (ACL) de baixar arquivo de processo. Retorna um objeto com `url` e, para arquivos privados, `expires`.",
        "parameters": [
          {
            "description": "ID do processo dono do arquivo.",
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "integer"
            }
          },
          {
            "description": "ID do arquivo a ser baixado.",
            "in": "path",
            "name": "arquivo",
            "required": true,
            "schema": {
              "type": "integer"
            }
          },
          {
            "description": "Quando verdadeiro (presente/truthy), o arquivo é servido com Content-Disposition inline (exibir no navegador). Quando ausente, é servido como attachment (download).",
            "in": "query",
            "name": "inline",
            "required": false,
            "schema": {
              "type": "boolean"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
