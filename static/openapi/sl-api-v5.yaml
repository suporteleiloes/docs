    "/api/website/v2/leiloes": {
      "get": {
        "tags": [
          "WebsiteV2"
        ],
        "summary": "Lista de leilões (catálogo público)",
        "operationId": "website_v2_leiloes_list",
        "description": "Paginado. Filtros opcionais via query string. Sem `X-TOKEN` retorna PUBLIC; com `X-TOKEN` válido retorna SITE (campos extras como `descricaoInterna`, `statsVisitas`, `extra.*`).\n\n**Casos de uso comuns** (combinações do mundo real, baseado em sites de leiloeiros existentes):\n- Home → destaques ativos: `?destaque=true&somenteAtivos=true&limit=8`\n- Página \"Judiciais\": `?judicial=true&somenteAtivos=true`\n- Página \"Extrajudiciais\": `?extrajudicial=true&somenteAtivos=true`\n- Página \"Encerrados\": `?status=99&sortBy=dataProximoLeilao&order=desc`\n- Página \"Cancelados\": `?status=96,97,98`\n- Agenda por data: `?data=2026-05-25` (também via `/agenda`)\n- Por vendedor/comitente: `?comitente=42`",
        "parameters": [
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 1,
              "minimum": 1
            }
          },
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 20,
              "minimum": 1,
              "maximum": 100
            }
          },
          {
            "name": "sortBy",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "dataProximoLeilao",
                "codigo",
                "totalLotes",
                "order",
                "id"
              ],
              "default": "dataProximoLeilao"
            },
            "description": "`order` = campo backend de ordenação manual."
          },
          {
            "name": "order",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "asc",
                "desc"
              ],
              "default": "asc"
            }
          },
          {
            "name": "descending",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Alias legado de `order` — `true` equivale a `order=desc`. Mantido pra compat com sites legados."
          },
          {
            "name": "search",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Busca em título/descrição/código"
          },
          {
            "name": "judicial",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Leilões judiciais"
          },
          {
            "name": "extrajudicial",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Leilões extrajudiciais (complemento de judicial)"
          },
          {
            "name": "vendaDireta",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            }
          },
          {
            "name": "destaque",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Apenas leilões marcados como destaque"
          },
          {
            "name": "status",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "pattern": "^[0-9]+(,[0-9]+)*$"
            },
            "description": "Status do leilão — CSV de códigos. Ex: `96,97,98` (cancelados), `99` (encerrados). Ver enum no schema `WebsiteV2_Leilao.status`."
          },
          {
            "name": "somenteAtivos",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Apenas leilões ativos (não cancelados/encerrados). `true` = filtra; `false` = só inativos; ausente = ignora."
          },
          {
            "name": "somentePublicados",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Apenas leilões com status >= 1 (publicados). Default true (oculta rascunhos)."
          },
          {
            "name": "instancia",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "enum": [
                1,
                2,
                3
              ]
            }
          },
          {
            "name": "ano",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "data",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date",
              "pattern": "^\\d{4}-\\d{2}-\\d{2}$"
            },
            "description": "Filtra leilões cujo `dataProximoLeilao` cai neste dia (YYYY-MM-DD)."
          },
          {
            "name": "totaisPorData",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Retorna apenas contagem agregada por data (em vez de itens completos). Útil pra calendário."
          },
          {
            "name": "comitente",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "ID do comitente — filtra leilões que tenham este comitente entre os participantes"
          },
          {
            "name": "X-TOKEN",
            "in": "header",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Token do site — eleva o nível pra SITE (libera campos extras)"
          }
        ],
        "responses": {
          "200": {
            "description": "Lista paginada de leilões",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/WebsiteV2_PaginatedLeiloes"
                }
              }
            }
          },
          "400": {
            "description": "Parâmetros inválidos",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/WebsiteV2_Error"
                }
              }
            }
          }
        },
        "security": [
          {
            "tenantHeader": []
          }
        ]
      }
    },
