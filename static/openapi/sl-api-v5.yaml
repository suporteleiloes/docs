    "description": "Referência da **API REST do ERP Suporte Leilões** para o **time de TI do leiloeiro**.\nCobre tudo que o ERP do seu tenant faz. Endpoints de **gerência (cross-tenant) não constam aqui**.\n\n## Base URL\n`https://api-v2.suporteleiloes.com.br`\n\n## Autenticação\nO cabeçalho **`uloc-mi`** é **obrigatório em TODAS as chamadas** — é o domínio do seu tenant (ex.: `sualeiloeira.com.br`) e diz qual base de dados responde.\nAlém dele, você se autentica de **uma de duas formas**:\n\n### 1) Token de API — **RECOMENDADO** (integrações)\nCrie um token em **Perfil → Tokens de API** dentro do ERP. Use-o no cabeçalho **`X-API-KEY`**:\n```http\nGET /api/leiloes\nuloc-mi: sualeiloeira.com.br\nX-API-KEY: sl_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx\n```\nÉ **permanente** (com validade opcional) — ideal para telão, bots, scripts e qualquer integração.\nO valor completo aparece **uma única vez**, no momento da criação — copie e guarde com segurança.\nPode **revogar** a qualquer momento na mesma tela. Cada token herda as permissões do usuário que o criou.\n\n### 2) JWT (login) — secundário\nPara sessões interativas/temporárias. Faça login e use o token retornado como `Authorization: Bearer`:\n```http\nPOST /api/auth\nuloc-mi: sualeiloeira.com.br\nContent-Type: application/json\n\n{ \"user\": \"seu-usuario\", \"pass\": \"sua-senha\" }\n```\nResposta: `{ \"token\": \"<jwt>\", \"refreshToken\": \"<opaco>\", \"user\": { ... } }`. Use `Authorization: Bearer <jwt>` nas chamadas seguintes.\nRenove com `POST /api/auth/refresh`; encerre com `POST /api/auth/logout`. O **JWT expira** (é de sessão) — para integrações, prefira o **Token de API** acima.\n\n## Convenções\n- **Multi-tenant:** o `uloc-mi` define o tenant; sem ele a chamada não resolve sua base.\n- **Soft-delete:** registros excluídos não aparecem nas listagens (filtro aplicado pelo servidor).\n- **Datas:** ISO-8601. **Valores monetários:** decimais (ex.: `1500.00`).\n- **Erros:** HTTP padrão — 401 (sem/expirado token), 403 (sem permissão/ACL), 404 (inexistente), 422 (validação)."
  },
