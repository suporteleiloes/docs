    "/api/auth": {
      "get": {
        "tags": [
          "Authentication"
        ],
        "summary": "🔐 Login — gerar JWT (+ refresh token)",
        "operationId": "uloc_token_new",
        "description": "Autentica usuário (`user` + `pass`) e retorna o **access token (JWT, 24h)** pra usar em `Authorization: Bearer <token>`, mais um **refresh token (30 dias)** pra renovar a sessão sem novo login (ver `POST /api/auth/refresh`).\n\nResposta inclui `token`, `expires`, `refreshToken`, `refreshExpires` e `user`. O `refreshToken` é **opaco e de uso único** (rotaciona a cada renovação) — guarde-o de forma segura (cookie httpOnly num BFF; nunca no `localStorage`).\n\n**TTLs e rate-limit configuráveis por tenant** (GlobalConfig): `auth.access_token.ttl` (s, default 86400), `auth.refresh_token.ttl` (s, default 2592000), `auth.refresh_token.enabled` (0/1), `auth.login.rate_limit.max` (default 10), `auth.login.rate_limit.window` (s, default 300). Com `auth.refresh_token.enabled=0` o login não devolve `refreshToken`.\n\n`202` = 2FA pendente. **Para integração servidor-a-servidor prefira API Key (`X-API-KEY`).**",
        "parameters": [],
        "responses": {
          "200": {
            "description": "Token gerado com sucesso (inclui refreshToken)",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthLoginResponse"
                }
              }
            }
          },
          "202": {
            "description": "2FA pendente"
          },
          "401": {
            "description": "Credenciais inválidas"
          },
          "429": {
            "description": "Rate-limit (10 tentativas / 5 min por IP+usuário)"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AuthLoginRequest"
              }
            }
          }
        },
        "security": [
          {
            "tenantHeader": []
          }
        ]
      }
    },
    "/api/auth/logout": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "🔐 Logout — invalidar sessão",
        "operationId": "uloc_token_logout",
        "description": "Revoga a sessão atual (pelo `jti` do token) — invalida também o **refresh token** associado. Necessário envio do token em `Authorization`.",
        "parameters": [],
        "responses": {
          "200": {
            "description": "Logout bem-sucedido"
          },
          "401": {
            "description": "Token ausente ou inválido"
          }
        },
        "requestBody": {
          "description": "Payload — schema ainda não documentado (TODO Fase 2)",
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "additionalProperties": true
              }
            }
          }
        }
      }
    },
    "/api/auth/refresh": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "🔐 Refresh — renovar o access token",
        "operationId": "uloc_token_refresh",
        "description": "Troca um **refresh token** válido por um **novo access token (JWT, 24h)** + um **novo refresh token** (rotação de uso único — o refresh anterior passa a retornar 401).\n\nNão exige `Authorization` (o próprio refresh token é a credencial). Escopo de tenant garantido pelo header `Uloc-Mi` (a sessão é buscada no banco do tenant). Logout/revogação invalidam o refresh.\n\nBoas práticas: rode quando o access token estiver perto de expirar (ou ao receber 401); guarde o novo `refreshToken` substituindo o anterior; transporte sempre sobre HTTPS.",
        "parameters": [],
        "responses": {
          "200": {
            "description": "Novo access + refresh token",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthRefreshResponse"
                }
              }
            }
          },
          "400": {
            "description": "refreshToken ausente"
          },
          "401": {
            "description": "Refresh token inválido, expirado, rotacionado ou revogado"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AuthRefreshRequest"
              }
            }
          }
        },
        "security": [
          {
            "tenantHeader": []
          }
        ]
      }
    },
