    "/api/website/v2/mapa": {
      "get": {
        "tags": [
          "WebsiteV2"
        ],
        "summary": "Lotes georeferenciados (lat/lng) pro mapa",
        "operationId": "website_v2_mapa",
        "description": "Retorna até 2000 pins. Só lotes ATIVOS de leilões publicados (não expõe estoque solto). Pra mapas grandes, usar filtros (uf/cidade/leilao) ou `bbox` (bounding box).",
        "parameters": [
          {
            "name": "uf",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "minLength": 2,
              "maxLength": 2
            },
            "example": "PR"
          },
          {
            "name": "cidade",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "leilao",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Pra renderizar mapa de um leilão específico"
          },
          {
            "name": "bbox",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "pattern": "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$"
            },
            "description": "Bounding box `sw_lat,sw_lng,ne_lat,ne_lng`",
            "example": "-26.0,-49.5,-25.0,-48.5"
          },
          {
            "name": "lat",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Centro da busca por raio (usar com `lng` + `raio`)."
          },
          {
            "name": "lng",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Centro da busca por raio (usar com `lat` + `raio`)."
          },
          {
            "name": "raio",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Raio em km ao redor de (lat,lng), aproximado por bounding box. `bbox` tem precedência."
          }
        ],
        "responses": {
          "200": {
            "description": "Pins encontrados",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/WebsiteV2_PinsList"
                }
              }
            }
          }
        },
        "security": [
          {
            "tenantHeader": []
          }
        ]
      }
    },
