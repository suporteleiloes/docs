                  "cancelado": {
                    "description": "Marca o lançamento como cancelado.",
                    "type": "boolean"
                  },
                  "categoria": {
                    "description": "ID da categoria (relacionada via FinanceiroManager::relacionaCategoria).",
                    "type": "integer"
                  },
                  "centroCusto": {
                    "description": "ID do centro de custo (relacionado via FinanceiroManager::relacionaCentroCusto).",
                    "type": "integer"
                  },
                  "conta": {
                    "description": "ID da conta bancária.",
                    "type": "integer"
                  },
                  "dataCompetencia": {
                    "description": "Data de competência (yyyy-MM-dd; aceita normalização de formatos BR/ISO).",
                    "format": "date",
                    "type": "string"
                  },
                  "dataPagamento": {
                    "description": "Data de pagamento (yyyy-MM-dd).",
                    "format": "date",
                    "type": "string"
                  },
                  "dataTermino": {
                    "description": "Data de término da recorrência (yyyy-MM-dd).",
                    "format": "date",
                    "type": "string"
                  },
                  "dataVencimento": {
                    "description": "Data de vencimento (yyyy-MM-dd).",
                    "format": "date",
                    "type": "string"
                  },
                  "dedutivel": {
                    "description": "Indica se é dedutível.",
                    "type": "boolean"
                  },
                  "descontos": {
                    "description": "Valor de descontos (formato 0.00).",
                    "type": "number"
                  },
                  "descricao": {
                    "description": "Descrição do lançamento.",
                    "type": "string"
