            "required": false,
            "schema": {
              "default": 100,
              "type": "integer"
            }
          },
          {
            "description": "Campo de ordenação. Valores aceitos: id, createdAt e data (data é alias de createdAt).",
            "in": "query",
            "name": "sortBy",
            "required": false,
            "schema": {
              "enum": [
