            },
            "description": "Veículo: ID do tipo de combustível."
          },
          {
            "name": "cor",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ID da cor."
          },
          {
            "name": "bbox",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "pattern": "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$"
            },
            "description": "Bounding box geográfica `sw_lat,sw_lng,ne_lat,ne_lng`. Filtra por lat/lng do bem.",
