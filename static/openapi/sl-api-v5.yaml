    "/api/arrematantes": {
      "post": {
        "tags": [
          "Arrematante"
        ],
        "summary": "Cadastrar arrematante (admin)",
        "operationId": "arrematante_create",
        "description": "Cria um novo arrematante junto com a Pessoa e o Usuario associados, dentro de uma transacao (rollback total em caso de falha). Valida documento (CPF/CNPJ para brasileiros), unicidade de documento e de e-mail, e sugere apelido automaticamente quando 'auto' ou vazio. Conforme a config 'arrematante.exigirDocsCadastro' o cadastro pode nascer inativo ate o envio de documentos; conforme 'arrematante.cadastro.forcar-analise' uma analise cadastral pode ser criada na sequencia. Esta rota administrativa exige a permissao ARREMATANTE_CRIAR (ha uma rota publica gemea em /api/public/arrematantes/cadastro). Retorna 201 com token JWT, dados do usuario e o arrematante serializado.",
        "parameters": [],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "description": "Campos mapeados pelo ArrematanteCadastroType (= ArrematanteType sem podeComprarSucata, termoRecebido, observacao, newsletter, lanceAutomatico, status, active e interesseArrematante) mais campos lidos diretamente do corpo pelo controller. allow_extra_fields esta ativo.",
                "properties": {
                  "apelido": {
                    "description": "Apelido/username do arrematante. Use 'auto' ou deixe vazio para gerar automaticamente a partir do nome.",
                    "type": "string"
                  },
                  "browserRegistration": {
                    "description": "Navegador de registro. Aceito do corpo apenas quando a requisicao vem de um site autenticado.",
                    "type": "string"
                  },
                  "conjugeCpf": {
                    "description": "CPF do conjuge.",
                    "type": "string"
                  },
                  "conjugeNome": {
                    "description": "Nome do conjuge.",
                    "type": "string"
                  },
                  "conjugeRg": {
                    "description": "RG do conjuge.",
                    "type": "string"
                  },
                  "deviceRegistration": {
                    "description": "Dispositivo de registro. Aceito do corpo apenas quando a requisicao vem de um site autenticado.",
                    "type": "string"
                  },
                  "estadoCivil": {
                    "description": "Estado civil do arrematante (pessoa fisica).",
                    "type": "string"
                  },
                  "ipRegistration": {
                    "description": "IP de registro. Aceito do corpo apenas quando a requisicao vem de um site autenticado; caso contrario e detectado pelo servidor.",
                    "type": "string"
                  },
                  "isEstrangeiroBrasileiro": {
                    "description": "Quando verdadeiro, trata o cadastro como brasileiro mesmo com nacionalidade diferente (aplica validacao de CPF/CNPJ).",
                    "type": "boolean"
                  },
                  "password": {
                    "description": "Senha do usuario a ser criado. Obrigatoria (minimo 6 caracteres) quando precadastro = true.",
                    "type": "string"
                  },
                  "pessoa": {
                    "description": "Dados da pessoa (PessoaType).",
                    "properties": {
                      "addresses": {
                        "description": "Colecao de enderecos (EnderecoType).",
                        "items": {
                          "type": "object"
                        },
                        "type": "array"
                      },
                      "birthDate": {
                        "description": "Data de nascimento. Aceita ISO yyyy-MM-dd e dd/MM/yyyy (IsoDateType).",
                        "type": "string"
                      },
                      "code": {
                        "description": "Codigo externo da pessoa.",
                        "type": "string"
                      },
                      "contacts": {
                        "description": "Colecao de contatos extras (ContatoExtraType).",
                        "items": {
                          "type": "object"
                        },
                        "type": "array"
                      },
                      "description": {
                        "description": "Descricao/observacao da pessoa.",
                        "type": "string"
                      },
                      "document": {
