    "/api/processos/{id}/nota": {
      "post": {
        "tags": [
          "Processo"
        ],
        "summary": "Criar nota ou comentário em processo",
        "operationId": "processo_nota_create",
        "description": "Cria uma nova nota vinculada ao processo ou, se o campo 'parent' for informado, cria um comentário (resposta) em uma nota existente. Notas exigem a ACL PROCESSO_NOTA_CRIAR e comentários exigem PROCESSO_NOTA_RESPONDER. É possível marcar pessoas via 'marks' (cria registros de NotaMarcacao) e, em notas, vincular uma pessoa via 'copyToPerson'. A ação é registrada no histórico (note.create, comunication.note ou note.comment) e retorna a nota/comentário serializado.",
        "parameters": [
          {
            "description": "ID do processo onde a nota será criada.",
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "contents": {
                    "description": "Conteúdo textual da nota (ou do comentário, quando 'parent' for informado).",
                    "type": "string"
                  },
                  "copyToPerson": {
                    "description": "ID da pessoa (Person) a ser vinculada à nota; gera também um log na entidade 'person'. Aplicável apenas a notas, não a comentários.",
                    "type": "integer"
                  },
                  "marks": {
                    "description": "Lista de IDs de pessoas (Person) a serem marcadas na nota ou comentário. IDs inexistentes são ignorados.",
                    "items": {
                      "type": "integer"
                    },
                    "type": "array"
                  },
                  "parent": {
                    "description": "ID da nota pai. Quando presente, o registro é criado como comentário (resposta) dessa nota em vez de nota nova.",
                    "type": "integer"
                  },
                  "type": {
                    "description": "Tipo da nota (somente em notas, ignorado em comentários). type=1 indica nota de comunicação ('comunication.note'); demais valores geram 'note.create'.",
                    "type": "integer"
                  }
                },
                "type": "object"
              }
            }
          },
          "required": true
        },
        "x-enriched": true
      }
    },
