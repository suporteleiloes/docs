    "/api/lotes/{id}/lance": {
      "post": {
        "tags": [
          "Cmd"
        ],
        "summary": "Registrar lance em um lote",
        "operationId": "lance",
        "description": "Registra um lance no lote informado. Pode ser chamado por um arrematante autenticado (ROLE_ARREMATANTE) dando o próprio lance, ou por um operador/controlador com a permissão CMD_LANCE — neste caso, informando `apelido` para lançar em nome de terceiros (exige CMD_LANCE_TERCEIROS) ou registrando o lance pela plateia presencial. Aplica regras de negócio: arrematante não aprovado só pode lançar se a configuração `arrematante.lance.cadastro-nao-aprovado` permitir, respeitando limite de lances e de incremento; lance parcelado valida número de parcelas (entre 2 e o limite do lote/leilão) e percentual de entrada (entre o mínimo e 99). Retorna o lote (id, status, statusMessage) e o lance criado serializado.",
        "parameters": [
          {
            "description": "ID do lote que receberá o lance.",
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "apelido": {
                    "description": "Apelido do arrematante em nome de quem o lance é dado. Usado apenas por operadores (não-arrematantes) e exige a permissão CMD_LANCE_TERCEIROS. Se ausente e o chamador não for arrematante, o lance é registrado pela plateia.",
                    "type": "string"
                  },
                  "boleta": {
                    "description": "Dados de boleta associados ao lance, repassados ao gerenciador do leilão. Opcional."
                  },
                  "lanceManual": {
                    "description": "Se presente (qualquer valor), marca o lance como manual (TIPO_MANUAL) em vez de predefinido (TIPO_PREDEFINIDO).",
                    "type": "boolean"
                  },
                  "parcelamento": {
                    "description": "Dados de lance parcelado. Quando `lanceParcelado` é verdadeiro, o sistema valida parcelas e entrada contra os limites do lote/leilão.",
                    "properties": {
                      "entrada": {
                        "description": "Percentual de entrada. Deve estar entre o mínimo configurado no lote/leilão e 99. Se omitido, usa a entrada mínima.",
                        "type": "integer"
                      },
                      "lanceParcelado": {
                        "description": "Indica que o lance é parcelado.",
                        "type": "boolean"
                      },
                      "parcelas": {
                        "description": "Número de parcelas. Deve estar entre 2 e o limite de parcelas do lote (ou do leilão). Se omitido, usa o limite do lote/leilão.",
                        "type": "integer"
                      }
                    },
                    "type": "object"
                  },
                  "valor": {
                    "description": "Valor do lance. Campo obrigatório.",
                    "format": "float",
                    "type": "number"
                  }
                },
                "required": [
                  "valor"
                ],
                "type": "object"
              }
            }
          },
          "required": true
        },
        "x-enriched": true
      }
    },
