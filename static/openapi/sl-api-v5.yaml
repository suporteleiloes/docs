            "schema": {
              "type": "integer"
            },
            "description": "Filtra lotes deste leilão. Não retorna 404 se o ID não existir — apenas lista vazia. Pra detectar leilão inexistente, valide antes via `GET /leiloes/{id}`."
          },
          {
            "name": "destaque",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            }
          },
          {
            "name": "somenteAtivos",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Apenas lotes ativos (não cancelados/vendidos/encerrados)."
          },
          {
            "name": "categoria",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "ID do tipoPai do bem (categoria mãe)"
          },
          {
            "name": "subcategoria",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "ID do tipo do bem (subcategoria)"
          },
          {
            "name": "uf",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "cidade",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "bairro",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "comitente",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "ID do comitente (vendedor). Aceita também `comitentes` (plural, mesmo valor) por compat legado."
          },
          {
            "name": "valorMinimo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            }
          },
          {
            "name": "valorMaximo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            }
          },
          {
            "name": "search",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Busca textual em título/descrição do bem + descrição do lote"
          },
          {
            "name": "criterio",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "numero",
                "id"
              ]
            },
            "description": "Modo de busca exata. Use junto com `valor`."
          },
          {
            "name": "valor",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Valor da busca exata definida em `criterio`."
          },
          {
            "name": "area_edificada_min",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área edificada mínima (m²)."
          },
          {
            "name": "area_edificada_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área edificada máxima (m²)."
          },
          {
            "name": "area_terreno_min",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área de terreno mínima (m²)."
          },
          {
            "name": "area_terreno_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "number"
            },
            "description": "Imóvel: área de terreno máxima (m²)."
          },
          {
