    "/api/tasks/{id}/comment": {
      "post": {
        "tags": [
          "Task"
        ],
        "summary": "Criar comentário (ou resposta) em tarefa",
        "operationId": "task_comment_create",
        "description": "Cria um novo comentário em uma tarefa ou, quando informado o campo 'parent', uma resposta a um comentário existente. Suporta marcação de pessoas (menções) via 'marks'. O acesso é controlado por ACL conforme o perfil: usuários ERP com 'req-gerencia' são redirecionados via proxy ao tenant do cliente; perfis de cliente/proxy passam por validação de membro do projeto; respostas exigem a ACL de responder e novos comentários a de criar. Após persistir, dispara notificação da tarefa e, se a tarefa estava aguardando cliente ou em homologação e o autor não é ERP, reabre a tarefa (status 'open'). Retorna o comentário serializado.",
        "parameters": [
          {
            "description": "ID da tarefa (Task) onde o comentário será criado.",
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "integer"
            }
          },
          {
            "description": "Quando verdadeiro e a requisição não for proxy, exige o papel ROLE_ERP e encaminha a operação via proxy ao tenant do cliente.",
            "in": "query",
            "name": "req-gerencia",
            "required": false,
            "schema": {
              "type": "boolean"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "marks": {
                    "description": "Lista de IDs de pessoas a serem marcadas/mencionadas no comentário. IDs inexistentes são ignorados.",
                    "items": {
                      "type": "integer"
                    },
                    "type": "array"
                  },
                  "parent": {
                    "description": "ID do comentário pai (TaskComment). Quando informado, cria uma resposta (reply) ao invés de um comentário novo.",
                    "type": "integer"
                  },
                  "text": {
                    "description": "Conteúdo textual do comentário/resposta.",
                    "type": "string"
                  }
                },
                "type": "object"
              }
            }
          },
          "required": true
        },
        "x-enriched": true
      }
    },
