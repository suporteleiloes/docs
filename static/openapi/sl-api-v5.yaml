    "/api/entregas": {
      "get": {
        "tags": [
          "Entrega"
        ],
        "summary": "Listar entregas (paginado por offset)",
        "operationId": "entrega_list",
        "description": "Lista entregas com filtros. ACL `ENTREGA_VER`. Envelope `{ result, total, page, limit }`.",
        "parameters": [
          {
            "name": "status",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "aguardando_chegada",
                "recebido_escritorio",
                "disponivel_retirada",
                "enviado",
                "entregue",
                "devolvido",
                "cancelado"
              ]
            }
          },
          {
            "name": "pessoa_id",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "documento",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "CPF/CNPJ (com ou sem máscara)."
          },
          {
            "name": "leilao",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "lote",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "tipo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Tipo de item presente na entrega (crlv, atpv, chave, ...)."
          },
          {
            "name": "atrasadas",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "Só entregas com data_prevista vencida e não finalizadas."
          },
          {
            "name": "data1",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date"
            },
            "description": "data_prevista >= data1."
          },
          {
            "name": "data2",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date"
            },
            "description": "data_prevista <= data2."
          },
          {
            "name": "search",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Busca em código, nome da pessoa, orientações e observações."
          },
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 1,
              "minimum": 1
            }
          },
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 20,
              "minimum": 1,
              "maximum": 100
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Lista de entregas",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Entrega_Paginated"
                }
              }
            }
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem ACL ENTREGA_VER"
          }
        },
        "security": [
          {
            "bearerAuth": [],
            "tenantHeader": []
          }
        ]
      },
      "post": {
        "tags": [
          "Entrega"
        ],
        "summary": "Criar entrega",
        "operationId": "entrega_create",
        "description": "Cria entrega com código auto (ENT-{ANO}-{6 dígitos}) + itens. ACL `ENTREGA_EDITAR`.",
        "parameters": [],
        "responses": {
          "201": {
            "description": "Entrega criada",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Entrega"
                }
              }
            }
          },
          "400": {
            "description": "pessoa_id obrigatório / tipo de item inválido"
          },
          "404": {
            "description": "Pessoa não encontrada"
          }
        },
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/Entrega_CreateRequest"
              }
            }
          }
        },
        "security": [
          {
            "bearerAuth": [],
            "tenantHeader": []
          }
        ]
      }
