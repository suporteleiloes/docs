            "in": "query",
            "name": "status",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "description": "Filtra pagamentos do lote informado (ID).",
            "in": "query",
            "name": "lote",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "description": "Filtra pagamentos do leilão informado (ID).",
            "in": "query",
            "name": "leilao",
