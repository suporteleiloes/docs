            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Imóvel: ID de FinalidadeImovel (residencial/comercial/...)."
          },
          {
            "name": "marca",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Veículo: ID da marca (preciso) ou texto (LIKE no nome)."
          },
          {
            "name": "modelo",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Veículo: ID do modelo (preciso) ou texto (LIKE no nome)."
          },
          {
            "name": "ano_min",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ano (modelo) mínimo."
          },
          {
            "name": "ano_max",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer"
            },
            "description": "Veículo: ano (modelo) máximo."
          },
          {
            "name": "km_max",
            "in": "query",
