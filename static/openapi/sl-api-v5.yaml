                        "type": "string"
                      },
                      "documents": {
                        "description": "Colecao de documentos adicionais (DocumentoType).",
                        "items": {
                          "type": "object"
                        },
                        "type": "array"
                      },
                      "emails": {
                        "description": "Colecao de e-mails (EmailType). O primeiro e usado como e-mail principal/login.",
                        "items": {
                          "type": "object"
                        },
                        "type": "array"
                      },
                      "extra": {
