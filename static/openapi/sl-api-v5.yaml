        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "banco": {
                    "description": "ID da conta bancária.",
                    "type": "integer"
                  },
                  "conteudo": {
                    "description": "Conteúdo bruto do extrato como string (alternativa a `csv`).",
                    "type": "string"
                  },
                  "csv": {
                    "description": "Conteúdo CSV do extrato como string.",
                    "type": "string"
                  },
                  "filename": {
                    "description": "Nome do arquivo, usado como dica de formato.",
                    "type": "string"
                  },
