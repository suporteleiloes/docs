                        "items": {
                          "type": "object"
                        },
                        "type": "array"
                      },
                      "phoneNumbers": {
                        "description": "Colecao de telefones (TelefoneType).",
                        "items": {
                          "type": "object"
                        },
                        "type": "array"
                      },
                      "surname": {
