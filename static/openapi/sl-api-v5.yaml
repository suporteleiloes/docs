    "/api/financeiro/conciliacao/preview": {
      "post": {
        "tags": [
          "Financeiro"
        ],
        "summary": "Preview de conciliação bancária",
        "operationId": "financeiro_conciliacao_preview",
        "description": "Recebe os lançamentos de um extrato bancário (como JSON em `lancamentos` ou como texto `csv`) e os concilia, em modo somente-leitura, contra as movimentações financeiras em aberto (`fin_movimentacao` com `deleted = 0` e `pago = 0`). O casamento é feito por VALOR (diferença menor que R$ 0,01, em valor absoluto) e por DATA, dentro de uma janela de tolerância de `janelaDias` (padrão 5 dias) comparando a data do lançamento com a data de vencimento da movimentação; cada movimentação só pode ser usada uma vez. Não altera nada no ERP — apenas retorna um resumo, a lista de lançamentos conciliados (com a movimentação correspondente) e a lista de divergentes (sem correspondência).",
        "parameters": [],
        "responses": {
          "200": {
            "description": "OK"
          },
          "400": {
            "description": "Requisição inválida"
          },
          "401": {
            "description": "Não autenticado"
          },
          "403": {
            "description": "Sem permissão"
          },
          "404": {
            "description": "Recurso não encontrado"
          },
          "500": {
            "description": "Erro interno"
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "properties": {
                  "csv": {
                    "description": "Alternativa ao campo `lancamentos`: extrato em CSV. Separador `;` ou `,` é autodetectado; colunas na ordem data, valor, descricao; cabeçalho (primeira linha sem dígitos na 1a coluna) é ignorado.",
                    "type": "string"
                  },
                  "janelaDias": {
                    "default": 5,
                    "description": "Janela de tolerância, em dias, entre a data do lançamento e a data de vencimento da movimentação para considerar conciliação.",
                    "type": "integer"
                  },
                  "lancamentos": {
                    "description": "Lista de lançamentos do extrato a conciliar. Datas são normalizadas a partir de Y-m-d, d/m/Y ou d-m-Y; valores aceitam formato BR (1.234,56) e são tratados em valor absoluto.",
                    "items": {
                      "properties": {
                        "data": {
                          "description": "Data do lançamento (ex.: 2026-06-01 ou 01/06/2026). Normalizada para Y-m-d.",
                          "type": "string"
                        },
                        "descricao": {
                          "description": "Descrição livre do lançamento (apenas informativa, não usada no matching).",
                          "type": "string"
                        },
                        "valor": {
                          "description": "Valor do lançamento. Aceita número ou string em formato BR; usado em valor absoluto no matching.",
                          "type": "number"
                        }
                      },
                      "type": "object"
                    },
                    "type": "array"
                  }
                },
                "type": "object"
              }
            }
          },
          "description": "Envie OU `lancamentos` (array de objetos) OU `csv` (texto). Se ambos forem enviados, `lancamentos` tem precedência. Se nenhum lançamento válido for extraído, retorna erro 400.",
          "required": true
        },
        "x-enriched": true
      }
    },
    "/api/financeiro/importar-extrato": {
      "post": {
        "tags": [
          "Financeiro"
        ],
        "summary": "Pré-visualizar importação de extrato bancário",
        "operationId": "financeiro_importar_extrato_preview",
        "description": "Faz o parse de um extrato bancário (OFX/CSV) e devolve as transações reconhecidas SEM gravar nada. Marca como duplicada cada transação cujo hash já exista no staging (financeiro_extrato_importado) da mesma conta. Aceita o arquivo via multipart (campo `arquivo` ou `file`) ou via JSON ({csv:\"...\"}, {conteudo:\"...\"} ou {lancamentos:[...]}). Retorna a lista de transações (data, descrição, valor arredondado, tipo C/D, documento, fitid, hash, duplicado), o formato detectado, os dados do banco e os totais (total e duplicados). Exige permissão EXTRATO_IMPORTAR.",
        "parameters": [
          {
            "description": "ID da conta bancária (Banco). Necessário para a checagem de duplicidade no staging; pode também vir no corpo JSON como `banco`. Sem ele, nenhuma transação é marcada como duplicada.",
            "in": "query",
            "name": "banco",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "description": "Força o formato de parse (ex.: ofx, csv). Se omitido, o parser tenta detectar pelo conteúdo/nome do arquivo. Pode também vir no corpo.",
            "in": "query",
            "name": "formato",
            "required": false,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK"
